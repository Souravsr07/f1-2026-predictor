name: Weekly F1 2026 Prediction Update

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      race_name:
        description: "Optional manual race name override"
        required: false
        default: ""
      force_retrain:
        description: "Force a full retrain before generating outputs"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: f1-2026-weekly-update
  cancel-in-progress: false

jobs:
  update-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      MPLBACKEND: Agg
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare runtime directories
        run: |
          mkdir -p data/raw/fastf1_cache
          mkdir -p data/processed
          mkdir -p results/diagnostics
          mkdir -p results/predictions
          mkdir -p results/eda
          mkdir -p dashboard/history

      - name: Fetch latest race data
        run: python scripts/fetch_latest.py
        continue-on-error: true

      - name: Refresh processed data
        run: |
          python data/pipeline.py --mode ergast_only --years 2025 2026
          python data/pipeline.py --mode merge
        continue-on-error: true

      - name: Retrain model
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_retrain == 'true' }}
        run: python predict.py --fit

      - name: Generate dashboard EDA inputs
        run: python scripts/run_eda.py

      - name: Generate race outputs
        run: python scripts/generate_outputs.py

      - name: Update championship forecast
        run: python scripts/update_championship.py
        continue-on-error: true

      - name: Refresh README
        run: python scripts/update_readme.py

      - name: Commit latest public artifacts
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "F1 Predictor Bot"
          git add README.md dashboard/ results/
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: latest forecast [$(date '+%Y-%m-%d')]"
            git push
          fi
